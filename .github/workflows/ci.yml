name: ci

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write      # push images + signatures to ghcr.io
  id-token: write      # OIDC token for keyless cosign signing

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [members, clubs, memberships, billing, notifications]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/courtside-${{ matrix.service }}:${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless sign (GitHub OIDC -> Fulcio -> Rekor)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/courtside-${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM and attach as attestation
        run: |
          syft ghcr.io/${{ github.repository_owner }}/courtside-${{ matrix.service }}@${{ steps.build.outputs.digest }} \
            -o spdx-json=sbom.spdx.json
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json \
            ghcr.io/${{ github.repository_owner }}/courtside-${{ matrix.service }}@${{ steps.build.outputs.digest }}
