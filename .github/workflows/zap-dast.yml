name: zap-dast
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  zap:
    runs-on: ubuntu-latest
    steps:
      - name: OWASP ZAP baseline scan (staging)
        run: |
          mkdir -p zap-out && chmod 777 zap-out
          docker run --rm --network host \
            -v "$PWD/zap-out:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t "${{ vars.STAGING_URL }}" -I \
              -r report.html -w report.md -J report.json \
              -z "-config replacer.full_list(0).description=host -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr=Host -config replacer.full_list(0).regex=false -config replacer.full_list(0).replacement=staging.courtside"
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-report
          path: zap-out/
