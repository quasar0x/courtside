apiVersion: v1
kind: ServiceAccount
metadata:
  name: courtside-viewer
  namespace: courtside
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: viewer
  namespace: courtside
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: viewer-binding
  namespace: courtside
subjects:
  - kind: ServiceAccount
    name: courtside-viewer
    namespace: courtside
roleRef:
  kind: Role
  name: viewer
  apiGroup: rbac.authorization.k8s.io
