apiVersion: apps/v1
kind: Deployment
metadata:
  name: eu-data
  namespace: residency-eu
  labels: { app: eu-data }
spec:
  replicas: 1
  selector: { matchLabels: { app: eu-data } }
  template:
    metadata: { labels: { app: eu-data, region: eu-west } }
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/region
                    operator: In
                    values: [eu-west]
      containers:
        - name: app
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
