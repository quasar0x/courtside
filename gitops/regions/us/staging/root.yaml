apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: us-staging-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/quasar0x/courtside.git
    targetRevision: main
    path: gitops/regions/us/staging/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
