name: billing
image:
  repository: courtside/billing
  tag: "0.1.0"
env:
  - name: PORT
    value: "8080"
  - name: PGHOST
    value: "postgres.courtside"
  - name: PGPORT
    value: "5432"
  - name: PGDATABASE
    value: "billing"
  - name: PGUSER
    valueFrom:
      secretKeyRef:
        name: postgres-from-vault
        key: POSTGRES_USER
  - name: PGPASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-from-vault
        key: POSTGRES_PASSWORD
  - name: KAFKA_BROKER
    value: "kafka.courtside:9092"
  - name: REDIS_ADDR
    value: "redis.courtside:6379"
