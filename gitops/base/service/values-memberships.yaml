name: memberships
image:
  repository: courtside/memberships
  tag: "0.1.0"
env:
  - name: PORT
    value: "8080"
  - name: PGHOST
    value: "postgres.courtside"
  - name: PGPORT
    value: "5432"
  - name: PGDATABASE
    value: "memberships"
  - name: PGUSER
    valueFrom:
      secretKeyRef:
        name: postgres-from-vault
        key: POSTGRES_USER
  - name: PGPASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-from-vault
        key: POSTGRES_PASSWORD
  - name: KAFKA_BROKER
    value: "kafka.courtside:9092"
