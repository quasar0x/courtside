name: clubs
image:
  repository: ghcr.io/quasar0x/courtside-clubs
  tag: "4c2e3f5cac3b9ab1b270416670cbd4926baf3471"
env:
  - name: PORT
    value: "8080"
  - name: MEMBERS_URL
    value: "http://members.courtside:8080"
  - name: PGHOST
    valueFrom:
      secretKeyRef:
        name: postgres
        key: PGHOST
  - name: PGPORT
    valueFrom:
      secretKeyRef:
        name: postgres
        key: PGPORT
  - name: PGUSER
    valueFrom:
      secretKeyRef:
        name: postgres
        key: PGUSER
  - name: PGPASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres
        key: PGPASSWORD
  - name: PGSSLMODE
    valueFrom:
      secretKeyRef:
        name: postgres
        key: PGSSLMODE
  - name: PGDATABASE
    value: "clubs"
