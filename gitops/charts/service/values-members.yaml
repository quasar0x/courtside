name: members
image:
  repository: courtside/members
  tag: "0.3.0"
env:
  - name: PORT
    value: "8080"
  - name: PGHOST
    value: "postgres.courtside"
  - name: PGPORT
    value: "5432"
  - name: PGDATABASE
    value: "members"
  - name: PGUSER
    valueFrom:
      secretKeyRef:
        name: postgres
        key: POSTGRES_USER
  - name: PGPASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres
        key: POSTGRES_PASSWORD

replicas: 1
